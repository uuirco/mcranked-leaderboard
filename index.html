 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCRANKED | Elite Leaderboard</title>
    <link rel="icon" type="image/png" href="trophy.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #060b16;
            --card-bg: rgba(17, 26, 46, 0.8);
            --accent-blue: #3b82f6;
            --text-dim: #94a3b8;
            --gold: #facc15;
            --silver: #cbd5e1;
            --bronze: #fb923c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #060b16 80%);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* PARTICLES */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-blue);
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(1px);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        /* CONTAINER */
        .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
            padding: 40px 0;
            position: relative;
            z-index: 2;
        }

        /* HEADER */
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px 32px;
            border-radius: 24px;
            margin-bottom: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .title-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title-img {
            height: 48px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(59,130,246,0.3));
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            height: 6px;
            width: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .verified-count {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(255,255,255,0.03);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .verified-count span {
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            margin-left: 6px;
        }

        .search-inline input {
            width: 220px;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .search-inline input:focus {
            width: 260px;
            border-color: var(--accent-blue);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 20px rgba(59,130,246,0.15);
        }

        /* LIST */
        .row {
            display: grid;
            grid-template-columns: 70px 1fr 150px 80px;
            align-items: center;
            background: var(--card-bg);
            padding: 16px 24px;
            margin-bottom: 12px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        .row:hover {
            transform: scale(1.01) translateX(8px);
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .rank {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 18px;
            color: var(--text-dim);
        }

        .rank-1 { color: var(--gold); text-shadow: 0 0 15px rgba(250, 204, 21, 0.4); font-size: 24px; }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            transition: transform 0.2s;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .row:hover .avatar { transform: scale(1.1) rotate(-5deg); }

        .name { font-weight: 700; font-size: 16px; }

        .tier {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.04);
            width: fit-content;
        }

        .region-tag {
            text-align: right;
            color: #10b981;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .card {
            width: 400px;
            background: linear-gradient(145deg, #111a2e, #0a0f1d);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .points-box {
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 14px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            color: #60a5fa;
            letter-spacing: 1px;
        }

        /* TIER COLORS */
        .HT1 { color: var(--gold); border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(250,204,21,0.2); }
        .LT1 { color: #fbbf24; }
        .HT2 { color: #e2e8f0; }
        .HT3 { color: #fdba74; }
    </style>
</head>

<body>
    <div id="particles"></div>

    <div class="container">
        <div class="header-box">
            <div class="title-section">
                <img src="MCRanked.png" alt="MCRANKED" class="title-img">
                <div class="subtitle"><span class="live-dot"></span>Elite Leaderboard</div>
            </div>

            <div class="verified-count">
                Users <span id="user-count">0</span>
            </div>

            <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                <div class="search-inline">
                    <input id="search" placeholder="Search player name...">
                </div>
                <a href="https://discord.gg/F2SbgD5PwW" target="_blank" style="background:#5865F2; padding:10px; border-radius:12px; display:flex;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="20" style="filter:invert(1)">
                </a>
            </div>
        </div>

        <div id="list"></div>
    </div>

    <div class="modal" id="modal">
        <div class="card">
            <div style="position:absolute; top:20px; right:25px; cursor:pointer; opacity:0.5" onclick="closeModal()">✕</div>
            <img id="mAvatar" width="120" height="120" style="border-radius:24px; margin-bottom:20px; border: 3px solid rgba(255,255,255,0.05);">
            <h2 id="mName" style="margin: 10px 0; font-size: 28px;"></h2>
            <div id="modalUUID" style="font-family:'JetBrains Mono'; font-size:10px; color:var(--text-dim); margin-bottom:20px; opacity:0.6;"></div>
            <div id="mTierBadge" class="tier">
                <span id="mTierText"></span>
            </div>
            <div id="mPoints"></div>
        </div>
    </div>

    <script>
        const tierPoints = { HT1:60, LT1:45, HT2:30, LT2:20, HT3:10, LT3:6, HT4:4, LT4:3, HT5:2, LT5:1 };
        let players = [];

        function createParticles() {
            const c = document.getElementById("particles");
            for(let i=0; i<60; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = Math.random() * 100 + "vw";
                p.style.animationDuration = (5 + Math.random() * 5) + "s";
                p.style.animationDelay = Math.random() * 5 + "s";
                c.appendChild(p);
            }
        }

        async function load() {
            try {
                const res = await fetch("verified_users.json?cache=" + Date.now());
                const data = await res.json();
                players = Object.values(data).map(p => ({
                    name: p.mc_username,
                    uuid: p.mc_uuid,
                    tier: p.current_tier || "UNRANKED",
                    region: "EU",
                    points: tierPoints[p.current_tier] || 0
                })).sort((a,b) => b.points - a.points);

                document.getElementById("user-count").innerText = players.length;
                render(players);
            } catch(e) { console.error("Load failed", e); }
        }

        function render(list) {
            const box = document.getElementById("list");
            box.innerHTML = "";

            list.forEach((p, i) => {
                const rank = i + 1;
                const row = document.createElement("div");
                row.className = "row";
                row.innerHTML = `
                    <div class="rank ${rank <= 3 ? 'rank-'+rank : ''}">#${rank}</div>
                    <div class="player-info">
                        <img class="avatar" src="https://mc-heads.net/avatar/${p.name}/44">
                        <div class="name">${p.name}</div>
                    </div>
                    <div class="tier-container">
                        <div class="tier ${p.tier}">${p.tier}</div>
                    </div>
                    <div class="region-tag">${p.region}</div>
                `;
                row.onclick = () => openProfile(p);
                box.appendChild(row);
            });
        }

        function openProfile(p) {
            const modal = document.getElementById("modal");
            modal.style.display = "flex";
            document.getElementById("mAvatar").src = `https://mc-heads.net/avatar/${p.name}/120`;
            document.getElementById("mName").innerText = p.name;
            document.getElementById("modalUUID").innerText = p.uuid;
            document.getElementById("mTierText").innerText = p.tier;
            document.getElementById("mTierBadge").className = "tier " + p.tier;
            document.getElementById("mPoints").innerHTML = `<div class="points-box">${p.points} RATING POINTS</div>`;
        }

        function closeModal() { document.getElementById("modal").style.display = "none"; }

const searchInput = document.getElementById("search");

searchInput.addEventListener("input", (e) => {
    const v = e.target.value.toLowerCase();
    const filtered = players.filter(p =>
        p.name.toLowerCase().includes(v)
    );
    render(filtered);
});

searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        const v = e.target.value.toLowerCase();

        const match = players.find(p =>
            p.name.toLowerCase() === v
        );

        if (match) {
            openProfile(match);
        }
    }
});

        window.onclick = (e) => { if(e.target == document.getElementById("modal")) closeModal(); }

        createParticles();
        load();
        setInterval(load, 30000);
    </script>
</body>
